<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed – ShopEase</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --primary: #4F46E5; --primary-dark: #3730A3; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #F1F5F9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
        .result-card { background: white; border-radius: 20px; box-shadow: 0 12px 48px rgba(0,0,0,0.1); width: 100%; max-width: 460px; padding: 3rem 2.5rem; text-align: center; }
        .x-circle { width: 90px; height: 90px; border-radius: 50%; background: #FEE2E2; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
        .x-circle i { font-size: 3rem; color: #DC2626; }
        .result-card h2 { font-weight: 800; color: #DC2626; }
        .result-sub { color: #64748B; font-size: 0.95rem; margin-bottom: 1.5rem; }
        .btn-primary { background: var(--primary); border: none; border-radius: 10px; padding: 0.75rem; font-weight: 700; width: 100%; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-light { border-radius: 10px; padding: 0.75rem; font-weight: 600; width: 100%; margin-top: 0.6rem; }
    </style>
</head>
<body>
<div class="result-card">
    <div class="x-circle"><i class="bi bi-x-lg"></i></div>
    <h2>Payment Failed</h2>
    <p class="result-sub" th:text="${errorMessage} ?: 'Your payment was cancelled or could not be completed. No money was deducted.'">
        Your payment could not be completed.
    </p>

    <a href="/cart" class="btn btn-primary"><i class="bi bi-arrow-repeat me-1"></i>Try Again</a>
    <a href="/" class="btn btn-light"><i class="bi bi-house me-1"></i>Back to Shop</a>
</div>
</body>
</html>
