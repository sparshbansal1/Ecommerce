<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail – Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --primary: #4F46E5; --primary-dark: #3730A3; --sidebar-w: 240px; }
        body { background: #F1F5F9; font-family: 'Segoe UI', system-ui, sans-serif; }
        .sidebar {
            width: var(--sidebar-w); min-height: 100vh;
            background: #0F172A; position: fixed; top: 0; left: 0;
            padding: 1.5rem 0; z-index: 100;
        }
        .sidebar-brand {
            color: white; font-size: 1.3rem; font-weight: 800;
            padding: 0 1.5rem 1.5rem;
            border-bottom: 1px solid #1E293B;
            display: block; text-decoration: none;
        }
        .sidebar-brand span { color: #F59E0B; }
        .sidebar-label {
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; color: #475569; padding: 1.2rem 1.5rem 0.4rem;
        }
        .sidebar-link {
            display: flex; align-items: center; gap: 0.7rem;
            padding: 0.65rem 1.5rem; color: #94A3B8;
            text-decoration: none; font-size: 0.9rem; font-weight: 500;
            transition: all 0.2s;
        }
        .sidebar-link:hover { background: #1E293B; color: white; }
        .sidebar-link i { font-size: 1rem; width: 20px; }
        .main-content { margin-left: var(--sidebar-w); }
        .topbar {
            background: white; border-bottom: 1px solid #E2E8F0;
            padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 50;
        }
        .topbar h1 { font-size: 1.25rem; font-weight: 800; margin: 0; }
        .content { padding: 2rem; }

        .detail-card {
            background: white; border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
            max-width: 900px;
        }
        .product-hero-img {
            width: 100%; height: 320px;
            object-fit: cover;
        }
        .detail-body { padding: 2rem; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .info-item {
            background: #F8FAFC; border-radius: 10px;
            padding: 1rem 1.2rem;
        }
        .info-item .label {
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.8px; color: #94A3B8; margin-bottom: 0.3rem;
        }
        .info-item .value { font-size: 1rem; font-weight: 700; color: #0F172A; }

        .btn-edit-lg {
            background: var(--primary); color: white; border: none;
            border-radius: 10px; padding: 0.6rem 1.5rem;
            font-weight: 600; text-decoration: none;
            display: inline-flex; align-items: center; gap: 0.4rem;
            transition: background 0.2s;
        }
        .btn-edit-lg:hover { background: var(--primary-dark); color: white; }
    </style>
</head>
<body>
<nav class="sidebar">
    <a class="sidebar-brand" href="/">Shop<span>Ease</span></a>
    <div class="sidebar-label">Main</div>
    <a class="sidebar-link" href="/"><i class="bi bi-house"></i>Home</a>
    <div class="sidebar-label">Product Module</div>
    <a class="sidebar-link" href="/admin/products"><i class="bi bi-box-seam"></i>Products</a>
    <a class="sidebar-link" href="/admin/products/add"><i class="bi bi-plus-circle"></i>Add Product</a>
    <div class="sidebar-label">Other Modules</div>
    <a class="sidebar-link" href="#"><i class="bi bi-cart3"></i>Shopping Cart</a>
    <a class="sidebar-link" href="#"><i class="bi bi-receipt"></i>Orders</a>
    <a class="sidebar-link" href="#"><i class="bi bi-credit-card"></i>Payments</a>
    <a class="sidebar-link" href="#"><i class="bi bi-people"></i>Users</a>
</nav>

<div class="main-content">
    <div class="topbar">
        <h1><i class="bi bi-eye me-2 text-primary"></i>Product Details</h1>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0" style="font-size:0.85rem;">
                <li class="breadcrumb-item"><a href="/admin/products" class="text-decoration-none">Products</a></li>
                <li class="breadcrumb-item active" th:text="${product.name}">Product</li>
            </ol>
        </nav>
    </div>

    <div class="content">
        <div class="detail-card">
            <img th:src="${product.imageUrl != null && !product.imageUrl.isEmpty()} ? ${product.imageUrl} : 'https://via.placeholder.com/900x320?text=No+Image'"
                 class="product-hero-img"
                 th:alt="${product.name}"
                 onerror="this.src='https://via.placeholder.com/900x320?text=No+Image'">

            <div class="detail-body">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div>
                        <span class="badge rounded-pill px-3 py-1 mb-2"
                              style="background:#EEF2FF;color:#4F46E5;font-size:0.8rem;"
                              th:text="${product.category != null} ? ${product.category.name} : 'Uncategorized'">
                        </span>
                        <h2 class="fw-800 mb-1" style="font-weight:800;" th:text="${product.name}">Product Name</h2>
                        <p class="text-muted" th:text="${product.description}">Description</p>
                    </div>
                    <div class="d-flex gap-2">
                        <a th:href="@{/admin/products/edit/{id}(id=${product.productId})}" class="btn-edit-lg">
                            <i class="bi bi-pencil"></i>Edit
                        </a>
                    </div>
                </div>

                <div class="info-grid mb-4">
                    <div class="info-item">
                        <div class="label">Product ID</div>
                        <div class="value" th:text="'#' + ${product.productId}">ID</div>
                    </div>
                    <div class="info-item">
                        <div class="label">Category</div>
                        <div class="value" th:text="${product.category != null} ? ${product.category.name} : 'None'">Cat</div>
                    </div>
                    <div class="info-item">
                        <div class="label">Price</div>
                        <div class="value" style="color:#4F46E5;" th:text="'₹' + ${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}">₹0</div>
                    </div>
                    <div class="info-item">
                        <div class="label">Stock Quantity</div>
                        <div class="value"
                             th:style="${product.stockQuantity == 0} ? 'color:#EF4444' : (${product.stockQuantity <= 5} ? 'color:#F59E0B' : 'color:#16A34A')"
                             th:text="${product.stockQuantity} + ' units'">
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <a href="/admin/products" class="btn btn-light rounded-3">
                        <i class="bi bi-arrow-left me-1"></i>Back to List
                    </a>
                    <a th:href="@{/admin/products/delete/{id}(id=${product.productId})}"
                       class="btn btn-danger rounded-3"
                       onclick="return confirm('Delete this product permanently?')">
                        <i class="bi bi-trash me-1"></i>Delete
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
