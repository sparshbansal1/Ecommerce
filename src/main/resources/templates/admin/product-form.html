<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' – Admin'">Product Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --primary: #4F46E5; --primary-dark: #3730A3; --sidebar-w: 240px; }
        body { background: #F1F5F9; font-family: 'Segoe UI', system-ui, sans-serif; }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-w);
            min-height: 100vh;
            background: #0F172A;
            position: fixed; top: 0; left: 0;
            padding: 1.5rem 0; z-index: 100;
        }
        .sidebar-brand {
            color: white; font-size: 1.3rem; font-weight: 800;
            padding: 0 1.5rem 1.5rem;
            border-bottom: 1px solid #1E293B;
            display: block; text-decoration: none;
        }
        .sidebar-brand span { color: #F59E0B; }
        .sidebar-label {
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; color: #475569; padding: 1.2rem 1.5rem 0.4rem;
        }
        .sidebar-link {
            display: flex; align-items: center; gap: 0.7rem;
            padding: 0.65rem 1.5rem;
            color: #94A3B8; text-decoration: none;
            font-size: 0.9rem; font-weight: 500;
            transition: all 0.2s;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background: #1E293B; color: white;
        }
        .sidebar-link.active { border-left: 3px solid var(--primary); }
        .sidebar-link i { font-size: 1rem; width: 20px; }

        /* MAIN */
        .main-content { margin-left: var(--sidebar-w); }
        .topbar {
            background: white; border-bottom: 1px solid #E2E8F0;
            padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 50;
        }
        .topbar h1 { font-size: 1.25rem; font-weight: 800; margin: 0; color: #0F172A; }
        .content { padding: 2rem; }

        /* FORM CARD */
        .form-card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
            max-width: 800px;
        }
        .form-label {
            font-weight: 600; font-size: 0.88rem;
            color: #374151; margin-bottom: 0.4rem;
        }
        .form-control, .form-select {
            border-radius: 10px;
            border: 1.5px solid #E2E8F0;
            padding: 0.6rem 0.9rem;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }
        .form-control.is-invalid, .form-select.is-invalid {
            border-color: #EF4444;
        }
        .invalid-feedback { font-size: 0.8rem; }

        /* IMAGE PREVIEW */
        .img-preview-wrap {
            width: 100%; height: 200px;
            border: 2px dashed #E2E8F0;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            background: #F8FAFC;
            transition: border-color 0.2s;
        }
        .img-preview-wrap.has-img { border-style: solid; border-color: var(--primary); }
        .img-preview-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
        .img-placeholder { text-align: center; color: #94A3B8; }
        .img-placeholder i { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }

        /* BUTTONS */
        .btn-save {
            background: var(--primary); color: white; border: none;
            border-radius: 10px; padding: 0.65rem 2rem;
            font-weight: 700; font-size: 0.95rem;
            transition: background 0.2s, transform 0.15s;
        }
        .btn-save:hover { background: var(--primary-dark); transform: translateY(-1px); color: white; }
        .btn-cancel {
            border-radius: 10px; padding: 0.65rem 1.5rem;
            font-weight: 600; font-size: 0.95rem;
        }

        /* SECTION DIVIDER */
        .form-section-title {
            font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            color: #94A3B8; margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #F1F5F9;
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
    <a class="sidebar-brand" href="/">Shop<span>Ease</span></a>
    <div class="sidebar-label">Main</div>
    <a class="sidebar-link" href="/"><i class="bi bi-house"></i>Home</a>
    <div class="sidebar-label">Product Module</div>
    <a class="sidebar-link" href="/admin/products"><i class="bi bi-box-seam"></i>Products</a>
    <a class="sidebar-link active" href="/admin/products/add"><i class="bi bi-plus-circle"></i>Add Product</a>
    <div class="sidebar-label">Order Module</div>
    <a class="sidebar-link" href="/admin/orders"><i class="bi bi-receipt"></i>Orders</a>
    <div class="sidebar-label">Account</div>
    <a class="sidebar-link" href="/logout"><i class="bi bi-box-arrow-right"></i>Logout</a>
</nav>

<!-- MAIN -->
<div class="main-content">
    <div class="topbar">
        <h1>
            <i class="bi bi-box-seam me-2 text-primary"></i>
            <span th:text="${pageTitle}">Product Form</span>
        </h1>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0" style="font-size:0.85rem;">
                <li class="breadcrumb-item"><a href="/admin/products" class="text-decoration-none">Products</a></li>
                <li class="breadcrumb-item active" th:text="${pageTitle}">Form</li>
            </ol>
        </nav>
    </div>

    <div class="content">
        <div class="form-card">

            <form th:action="${product.productId != null} ? @{/admin/products/edit/{id}(id=${product.productId})} : @{/admin/products/add}"
                  th:object="${product}"
                  method="post">

                <!-- Global validation error banner -->
                <div th:if="${#fields.hasAnyErrors()}"
                     class="alert alert-danger rounded-3 mb-3" role="alert">
                    <i class="bi bi-exclamation-circle-fill me-2"></i>
                    <strong>Please fix the errors below before saving.</strong>
                </div>

                <!-- ── BASIC INFO ── -->
                <div class="form-section-title">Basic Information</div>

                <div class="row g-3 mb-3">
                    <div class="col-md-8">
                        <label class="form-label">Product Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control"
                               th:field="*{name}"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                               placeholder="e.g., Wireless Headphones Pro">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Category</label>
                        <select name="categoryId" class="form-select">
                            <option value="">-- Select Category --</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.categoryId}"
                                    th:text="${cat.name}"
                                    th:selected="${product.category != null && product.category.categoryId == cat.categoryId}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control"
                              th:field="*{description}"
                              rows="3"
                              placeholder="Describe the product features, specifications, etc."></textarea>
                </div>

                <!-- ── PRICING & STOCK ── -->
                <div class="form-section-title mt-4">Pricing & Stock</div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Price (₹) <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text" style="border-radius:10px 0 0 10px; border:1.5px solid #E2E8F0;">₹</span>
                            <input type="number" step="0.01" min="0"
                                   class="form-control"
                                   th:field="*{price}"
                                   th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''"
                                   placeholder="0.00"
                                   style="border-radius:0 10px 10px 0;">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Stock Quantity <span class="text-danger">*</span></label>
                        <input type="number" min="0"
                               class="form-control"
                               th:field="*{stockQuantity}"
                               th:classappend="${#fields.hasErrors('stockQuantity')} ? 'is-invalid' : ''"
                               placeholder="e.g., 100">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('stockQuantity')}" th:errors="*{stockQuantity}"></div>
                    </div>
                </div>

                <!-- ── IMAGE ── -->
                <div class="form-section-title mt-4">Product Image</div>

                <div class="row g-3 mb-4">
                    <div class="col-md-7">
                        <label class="form-label">Image URL</label>
                        <input type="text" class="form-control"
                               th:field="*{imageUrl}"
                               placeholder="https://example.com/image.jpg"
                               oninput="previewImage(this.value)">
                        <div class="form-text text-muted">Paste a URL from Unsplash or any image host.</div>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label">Preview</label>
                        <div class="img-preview-wrap" id="imgPreviewWrap">
                            <div th:if="${product.imageUrl != null && !product.imageUrl.isEmpty()}" style="width:100%;height:100%;">
                                <img th:src="${product.imageUrl}" id="imgPreview" th:alt="${product.name}">
                            </div>
                            <div th:unless="${product.imageUrl != null && !product.imageUrl.isEmpty()}"
                                 class="img-placeholder" id="imgPlaceholder">
                                <i class="bi bi-image"></i>
                                <span style="font-size:0.8rem;">Image preview</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ── BUTTONS ── -->
                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn btn-save">
                        <i class="bi bi-check-lg me-2"></i>
                        <span th:text="${product.productId != null} ? 'Update Product' : 'Save Product'">Save</span>
                    </button>
                    <a href="/admin/products" class="btn btn-light btn-cancel">
                        <i class="bi bi-arrow-left me-1"></i>Cancel
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function previewImage(url) {
        const wrap = document.getElementById('imgPreviewWrap');
        let img = document.getElementById('imgPreview');
        let placeholder = document.getElementById('imgPlaceholder');

        if (url && url.trim() !== '') {
            if (!img) {
                img = document.createElement('img');
                img.id = 'imgPreview';
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                img.style.borderRadius = '10px';
                wrap.innerHTML = '';
                wrap.appendChild(img);
            }
            img.src = url;
            img.onerror = () => {
                wrap.innerHTML = '<div class="img-placeholder" id="imgPlaceholder"><i class="bi bi-image-slash" style="font-size:2.5rem;display:block;margin-bottom:.5rem;color:#94A3B8;"></i><span style="font-size:0.8rem;">Invalid URL</span></div>';
            };
            wrap.classList.add('has-img');
        } else {
            wrap.innerHTML = '<div class="img-placeholder" id="imgPlaceholder"><i class="bi bi-image" style="font-size:2.5rem;display:block;margin-bottom:.5rem;"></i><span style="font-size:0.8rem;">Image preview</span></div>';
            wrap.classList.remove('has-img');
        }
    }

    // Init preview if editing (th:field renders id as "imageUrl")
    window.onload = () => {
        const input = document.getElementById('imageUrl');
        if (input && input.value.trim()) {
            previewImage(input.value);
        }
    };
</script>
</body>
</html>
