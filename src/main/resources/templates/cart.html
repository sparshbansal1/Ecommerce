<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart – ShopEase</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #3730A3;
            --accent: #F59E0B;
            --surface: #F1F5F9;
            --dark: #0F172A;
            --card-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--surface); color: var(--dark); }

        /* ── NAVBAR ── */
        .navbar { background: white; box-shadow: 0 1px 12px rgba(0,0,0,0.08); padding: 0.75rem 0; position: sticky; top: 0; z-index: 1000; }
        .navbar-brand { font-size: 1.5rem; font-weight: 800; color: var(--primary) !important; letter-spacing: -0.5px; }
        .navbar-brand span { color: var(--accent); }
        .nav-link { font-weight: 500; color: #475569 !important; padding: 0.5rem 1rem !important; border-radius: 8px; transition: all 0.2s; }
        .nav-link:hover { background: #EEF2FF; color: var(--primary) !important; }
        .btn-login { background: var(--primary); color: white !important; border-radius: 8px; padding: 0.45rem 1.2rem !important; font-weight: 600; }
        .btn-login:hover { background: var(--primary-dark); }

        /* ── PAGE HEADING ── */
        .page-head { font-size: 1.8rem; font-weight: 800; }
        .page-head span { color: var(--primary); }

        /* ── CART CARD ── */
        .cart-card { background: white; border-radius: 16px; box-shadow: var(--card-shadow); overflow: hidden; }
        .cart-item { display: flex; align-items: center; gap: 1rem; padding: 1.1rem 1.3rem; border-bottom: 1px solid #EEF2F6; }
        .cart-item:last-child { border-bottom: none; }
        .cart-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; background: #F1F5F9; flex-shrink: 0; }
        .cart-name { font-weight: 700; font-size: 1rem; color: var(--dark); text-decoration: none; }
        .cart-name:hover { color: var(--primary); }
        .cart-unit { font-size: 0.82rem; color: #94A3B8; }
        .qty-input { width: 64px; border-radius: 8px; border: 1.5px solid #E2E8F0; padding: 0.35rem 0.5rem; text-align: center; font-weight: 600; }
        .qty-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); outline: none; }
        .cart-subtotal { font-weight: 800; font-size: 1.05rem; color: var(--primary); min-width: 110px; text-align: right; }
        .btn-qty { border: none; background: #EEF2FF; color: var(--primary); border-radius: 8px; padding: 0.35rem 0.6rem; }
        .btn-qty:hover { background: var(--primary); color: white; }
        .btn-remove { border: none; background: #FEE2E2; color: #DC2626; border-radius: 8px; padding: 0.4rem 0.65rem; }
        .btn-remove:hover { background: #DC2626; color: white; }

        /* ── SUMMARY ── */
        .summary-card { background: white; border-radius: 16px; box-shadow: var(--card-shadow); padding: 1.5rem; position: sticky; top: 90px; }
        .summary-card h5 { font-weight: 800; margin-bottom: 1.2rem; }
        .summary-row { display: flex; justify-content: space-between; font-size: 0.92rem; color: #475569; margin-bottom: 0.7rem; }
        .summary-total { display: flex; justify-content: space-between; font-size: 1.25rem; font-weight: 800; border-top: 2px dashed #E2E8F0; padding-top: 1rem; margin-top: 0.5rem; }
        .summary-total span:last-child { color: var(--primary); }
        .btn-checkout { background: var(--primary); color: white; border: none; border-radius: 10px; padding: 0.8rem; font-weight: 700; width: 100%; transition: background 0.2s, transform 0.15s; }
        .btn-checkout:hover { background: var(--primary-dark); transform: translateY(-1px); color: white; }
        .btn-continue { border-radius: 10px; padding: 0.7rem; font-weight: 600; width: 100%; }

        /* ── EMPTY STATE ── */
        .empty-cart { text-align: center; padding: 5rem 1rem; color: #94A3B8; }
        .empty-cart i { font-size: 5rem; display: block; margin-bottom: 1rem; }
        .empty-cart h4 { font-weight: 800; color: #475569; }

        /* ── FLOATING ALERT ── */
        .alert-float { position: fixed; top: 80px; right: 20px; z-index: 2000; min-width: 280px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

<!-- ═══════════ FLOATING ALERTS ═══════════ -->
<div th:if="${successMessage}" class="alert alert-success alert-dismissible alert-float shadow" role="alert">
    <i class="bi bi-check-circle-fill me-2"></i>
    <span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<div th:if="${errorMessage}" class="alert alert-danger alert-dismissible alert-float shadow" role="alert">
    <i class="bi bi-exclamation-circle-fill me-2"></i>
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<!-- ═══════════ NAVBAR ═══════════ -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">Shop<span>Ease</span></a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto ms-3 gap-1">
                <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house me-1"></i>Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/?categoryId="><i class="bi bi-grid me-1"></i>Products</a></li>
                <li class="nav-item" th:if="${currentUser != null}"><a class="nav-link" href="/my-orders"><i class="bi bi-bag-check me-1"></i>My Orders</a></li>
                <li class="nav-item" th:if="${currentUser != null}"><a class="nav-link" href="/profile"><i class="bi bi-person-gear me-1"></i>Profile</a></li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <a href="/cart" class="btn btn-outline-secondary btn-sm rounded-3 position-relative">
                    <i class="bi bi-bag me-1"></i>Cart
                    <span th:if="${cartCount != null && cartCount > 0}"
                          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                          th:text="${cartCount}">0</span>
                </a>

                <!-- Not logged in: show Login (no Admin button) -->
                <a th:if="${currentUser == null}" href="/login" class="nav-link btn-login">
                    <i class="bi bi-person-circle me-1"></i>Login
                </a>

                <!-- Admin button: only for ADMIN users -->
                <a th:if="${currentUser != null and currentUser.role == 'ADMIN'}"
                   href="/admin/products" class="btn btn-outline-primary btn-sm rounded-3">
                    <i class="bi bi-shield-check me-1"></i>Admin
                </a>

                <!-- Logged in: greeting + Logout -->
                <span th:if="${currentUser != null}" class="fw-semibold text-secondary small d-none d-lg-inline">
                    <i class="bi bi-person-check-fill me-1"></i><span th:text="${currentUser.username}">user</span>
                </span>
                <a th:if="${currentUser != null}" href="/logout" class="btn btn-outline-danger btn-sm rounded-3">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </a>
            </div>
        </div>
    </div>
</nav>

<!-- ═══════════ CART ═══════════ -->
<section class="container my-4 my-lg-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="page-head mb-0"><i class="bi bi-cart3 me-2"></i>My <span>Cart</span></h1>
        <span class="badge bg-primary rounded-pill fs-6 fw-normal px-3"
              th:text="${totalItems} + ' item' + (${totalItems == 1} ? '' : 's')">0 items</span>
    </div>

    <!-- Empty cart -->
    <div th:if="${cartItems.isEmpty()}" class="cart-card">
        <div class="empty-cart">
            <i class="bi bi-cart-x"></i>
            <h4>Your cart is empty</h4>
            <p>Looks like you haven't added anything yet.</p>
            <a href="/" class="btn btn-primary rounded-3 mt-2">
                <i class="bi bi-bag-heart me-1"></i>Start Shopping
            </a>
        </div>
    </div>

    <!-- Cart with items -->
    <div th:unless="${cartItems.isEmpty()}" class="row g-4">

        <!-- Items list -->
        <div class="col-lg-8">
            <div class="cart-card">
                <div class="cart-item" th:each="item : ${cartItems}">
                    <img class="cart-img"
                         th:src="${item.imageUrl != null && !item.imageUrl.isEmpty()} ? ${item.imageUrl} : 'https://via.placeholder.com/120?text=No+Image'"
                         th:alt="${item.name}"
                         onerror="this.src='https://via.placeholder.com/120?text=No+Image'">

                    <div class="flex-grow-1">
                        <a th:href="@{/product/{id}(id=${item.productId})}" class="cart-name d-block"
                           th:text="${item.name}">Product Name</a>
                        <div class="cart-unit">
                            ₹<span th:text="${#numbers.formatDecimal(item.price, 1, 'COMMA', 2, 'POINT')}">0.00</span> each
                        </div>
                    </div>

                    <!-- Quantity update -->
                    <form th:action="@{/cart/update/{id}(id=${item.productId})}" method="post"
                          class="d-flex align-items-center gap-2 m-0">
                        <input type="number" name="quantity" min="0" th:value="${item.quantity}" class="qty-input">
                        <button type="submit" class="btn-qty" title="Update quantity">
                            <i class="bi bi-arrow-repeat"></i>
                        </button>
                    </form>

                    <!-- Subtotal -->
                    <div class="cart-subtotal">
                        ₹<span th:text="${#numbers.formatDecimal(item.subtotal, 1, 'COMMA', 2, 'POINT')}">0.00</span>
                    </div>

                    <!-- Remove -->
                    <a th:href="@{/cart/remove/{id}(id=${item.productId})}" class="btn-remove" title="Remove item">
                        <i class="bi bi-trash"></i>
                    </a>
                </div>
            </div>

            <div class="d-flex justify-content-between mt-3">
                <a href="/" class="btn btn-light rounded-3">
                    <i class="bi bi-arrow-left me-1"></i>Continue Shopping
                </a>
                <a href="/cart/clear" class="btn btn-outline-danger rounded-3">
                    <i class="bi bi-trash me-1"></i>Clear Cart
                </a>
            </div>
        </div>

        <!-- Order summary -->
        <div class="col-lg-4">
            <div class="summary-card">
                <h5><i class="bi bi-receipt me-2"></i>Order Summary</h5>
                <div class="summary-row">
                    <span>Items</span>
                    <span th:text="${totalItems}">0</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span class="text-success fw-semibold">FREE</span>
                </div>
                <div class="summary-total">
                    <span>Total</span>
                    <span>₹<span th:text="${#numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT')}">0.00</span></span>
                </div>
                <form th:action="@{/payment/checkout}" method="post" class="m-0">
                    <button type="submit" class="btn-checkout mt-4">
                        <i class="bi bi-lock-fill me-1"></i>Proceed to Checkout
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Auto-dismiss floating alerts after 3 seconds
    setTimeout(() => {
        document.querySelectorAll('.alert-float').forEach(a => {
            bootstrap.Alert.getOrCreateInstance(a).close();
        });
    }, 3000);
</script>
</body>
</html>
