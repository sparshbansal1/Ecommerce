<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – ShopEase</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --primary: #4F46E5; --primary-dark: #3730A3; --accent: #F59E0B; }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #4F46E5 0%, #3730A3 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
        }
        .auth-card { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 420px; overflow: hidden; }
        .auth-head { text-align: center; padding: 2rem 2rem 1rem; }
        .auth-brand { font-size: 1.8rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        .auth-brand span { color: var(--accent); }
        .auth-sub { color: #64748B; font-size: 0.9rem; margin-top: 0.3rem; }
        .auth-body { padding: 1rem 2rem 2rem; }
        .form-label { font-weight: 600; font-size: 0.85rem; color: #374151; }
        .form-control { border-radius: 10px; border: 1.5px solid #E2E8F0; padding: 0.65rem 0.9rem; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        .btn-auth { background: var(--primary); color: white; border: none; border-radius: 10px; padding: 0.75rem; font-weight: 700; width: 100%; transition: background 0.2s, transform 0.15s; }
        .btn-auth:hover { background: var(--primary-dark); transform: translateY(-1px); color: white; }
        .auth-foot { text-align: center; font-size: 0.9rem; color: #64748B; margin-top: 1.2rem; }
        .auth-foot a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .demo-box { background: #EEF2FF; border-radius: 12px; padding: 0.9rem 1rem; font-size: 0.8rem; color: #475569; margin-bottom: 1.2rem; }
        .demo-box b { color: var(--primary); }
        .demo-btn { border: 1px solid var(--primary); color: var(--primary); background: white; border-radius: 8px; font-size: 0.78rem; font-weight: 600; padding: 0.25rem 0.6rem; }
        .demo-btn:hover { background: var(--primary); color: white; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="auth-head">
        <a href="/" class="auth-brand text-decoration-none">Shop<span>Ease</span></a>
        <div class="auth-sub">Welcome back! Please log in to continue.</div>
    </div>
    <div class="auth-body">

        <!-- Alerts -->
        <div th:if="${errorMessage}" class="alert alert-danger py-2 small" role="alert">
            <i class="bi bi-exclamation-circle-fill me-1"></i><span th:text="${errorMessage}"></span>
        </div>
        <div th:if="${successMessage}" class="alert alert-success py-2 small" role="alert">
            <i class="bi bi-check-circle-fill me-1"></i><span th:text="${successMessage}"></span>
        </div>

        <!-- Demo accounts -->
        <div class="demo-box">
            <div class="mb-2"><i class="bi bi-info-circle me-1"></i>Demo accounts (click to fill):</div>
            <div class="d-flex gap-2">
                <button type="button" class="demo-btn" onclick="fill('admin','admin123')">
                    <i class="bi bi-shield-check me-1"></i>Admin
                </button>
                <button type="button" class="demo-btn" onclick="fill('user','user123')">
                    <i class="bi bi-person me-1"></i>User
                </button>
            </div>
        </div>

        <!-- Login form -->
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn-auth"><i class="bi bi-box-arrow-in-right me-1"></i>Login</button>
        </form>

        <div class="auth-foot">
            Don't have an account? <a href="/signup">Sign up</a>
            <div class="mt-2"><a href="/" class="text-muted"><i class="bi bi-arrow-left me-1"></i>Back to shop</a></div>
        </div>
    </div>
</div>

<script>
    function fill(u, p) {
        document.getElementById('username').value = u;
        document.getElementById('password').value = p;
    }
</script>
</body>
</html>
