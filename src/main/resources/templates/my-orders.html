<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders – ShopEase</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --primary: #4F46E5; --primary-dark: #3730A3; --accent: #F59E0B; --surface: #F1F5F9; --dark: #0F172A; --card-shadow: 0 4px 24px rgba(0,0,0,0.06); }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--surface); color: var(--dark); }

        .navbar { background: white; box-shadow: 0 1px 12px rgba(0,0,0,0.08); padding: 0.75rem 0; position: sticky; top: 0; z-index: 1000; }
        .navbar-brand { font-size: 1.5rem; font-weight: 800; color: var(--primary) !important; letter-spacing: -0.5px; }
        .navbar-brand span { color: var(--accent); }
        .nav-link { font-weight: 500; color: #475569 !important; padding: 0.5rem 1rem !important; border-radius: 8px; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: #EEF2FF; color: var(--primary) !important; }
        .btn-login { background: var(--primary); color: white !important; border-radius: 8px; padding: 0.45rem 1.2rem !important; font-weight: 600; }
        .btn-login:hover { background: var(--primary-dark); }

        .page-head { font-size: 1.8rem; font-weight: 800; }
        .page-head span { color: var(--primary); }

        .order-card { background: white; border-radius: 16px; box-shadow: var(--card-shadow); padding: 1.3rem 1.5rem; margin-bottom: 1.2rem; transition: transform 0.15s, box-shadow 0.15s; }
        .order-card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(79,70,229,0.12); }
        .order-id { font-weight: 800; font-size: 1.1rem; color: var(--dark); }
        .order-id span { color: var(--primary); }
        .order-meta { font-size: 0.85rem; color: #94A3B8; }
        .order-total { font-weight: 800; font-size: 1.15rem; color: var(--primary); }

        .status-pill { padding: 0.32rem 0.85rem; border-radius: 20px; font-size: 0.78rem; font-weight: 700; display: inline-flex; align-items: center; gap: 0.35rem; }
        .st-PENDING { background: #FEF9C3; color: #92660C; }
        .st-SHIPPED { background: #DBEAFE; color: #1D4ED8; }
        .st-DELIVERED { background: #DCFCE7; color: #15803D; }
        .st-CANCELLED { background: #FEE2E2; color: #B91C1C; }

        .mini-track { display: flex; align-items: center; gap: 0; margin-top: 0.9rem; }
        .mini-step { display: flex; align-items: center; flex: 1; }
        .mini-dot { width: 22px; height: 22px; border-radius: 50%; background: #E2E8F0; color: #94A3B8; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; flex-shrink: 0; }
        .mini-dot.done { background: #16A34A; color: white; }
        .mini-line { height: 3px; background: #E2E8F0; flex: 1; }
        .mini-line.done { background: #16A34A; }
        .mini-label { font-size: 0.68rem; color: #64748B; margin-top: 0.25rem; text-align: center; }

        .btn-track { background: var(--primary); color: white; border: none; border-radius: 10px; padding: 0.55rem 1.2rem; font-weight: 600; font-size: 0.88rem; transition: background 0.2s, transform 0.15s; text-decoration: none; }
        .btn-track:hover { background: var(--primary-dark); color: white; transform: translateY(-1px); }

        .empty-state { text-align: center; padding: 5rem 1rem; color: #94A3B8; background: white; border-radius: 16px; box-shadow: var(--card-shadow); }
        .empty-state i { font-size: 5rem; display: block; margin-bottom: 1rem; }
        .empty-state h4 { font-weight: 800; color: #475569; }

        .alert-float { position: fixed; top: 80px; right: 20px; z-index: 2000; min-width: 280px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

<!-- FLOATING ALERTS -->
<div th:if="${successMessage}" class="alert alert-success alert-dismissible alert-float shadow" role="alert">
    <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<div th:if="${errorMessage}" class="alert alert-danger alert-dismissible alert-float shadow" role="alert">
    <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">Shop<span>Ease</span></a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto ms-3 gap-1">
                <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house me-1"></i>Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/?categoryId="><i class="bi bi-grid me-1"></i>Products</a></li>
                <li class="nav-item" th:if="${currentUser != null}"><a class="nav-link active" href="/my-orders"><i class="bi bi-bag-check me-1"></i>My Orders</a></li>
                <li class="nav-item" th:if="${currentUser != null}"><a class="nav-link" href="/profile"><i class="bi bi-person-gear me-1"></i>Profile</a></li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <a href="/cart" class="btn btn-outline-secondary btn-sm rounded-3 position-relative">
                    <i class="bi bi-bag me-1"></i>Cart
                    <span th:if="${cartCount != null && cartCount > 0}"
                          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                          th:text="${cartCount}">0</span>
                </a>
                <a th:if="${currentUser == null}" href="/login" class="nav-link btn-login">
                    <i class="bi bi-person-circle me-1"></i>Login
                </a>
                <a th:if="${currentUser != null and currentUser.role == 'ADMIN'}"
                   href="/admin/products" class="btn btn-outline-primary btn-sm rounded-3">
                    <i class="bi bi-shield-check me-1"></i>Admin
                </a>
                <span th:if="${currentUser != null}" class="fw-semibold text-secondary small d-none d-lg-inline">
                    <i class="bi bi-person-check-fill me-1"></i><span th:text="${currentUser.username}">user</span>
                </span>
                <a th:if="${currentUser != null}" href="/logout" class="btn btn-outline-danger btn-sm rounded-3">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </a>
            </div>
        </div>
    </div>
</nav>

<!-- MY ORDERS -->
<section class="container my-4 my-lg-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="page-head mb-0"><i class="bi bi-bag-check me-2"></i>My <span>Orders</span></h1>
        <span class="badge bg-primary rounded-pill fs-6 fw-normal px-3"
              th:text="${orders.size()} + ' order' + (${orders.size() == 1} ? '' : 's')">0 orders</span>
    </div>

    <!-- Empty state -->
    <div th:if="${orders.isEmpty()}" class="empty-state">
        <i class="bi bi-box-seam"></i>
        <h4>No orders yet</h4>
        <p>Once you place an order it will show up here so you can track it.</p>
        <a href="/" class="btn btn-primary rounded-3 mt-2">
            <i class="bi bi-bag-heart me-1"></i>Start Shopping
        </a>
    </div>

    <!-- Orders list -->
    <div th:unless="${orders.isEmpty()}">
        <div class="order-card" th:each="order : ${orders}">
            <div class="row align-items-center g-3">

                <!-- Order info -->
                <div class="col-md-3">
                    <div class="order-id">Order <span th:text="'#' + ${order.orderId}">#1</span></div>
                    <div class="order-meta">
                        <i class="bi bi-calendar3 me-1"></i>
                        <span th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy, HH:mm')}">date</span>
                    </div>
                    <div class="order-meta mt-1">
                        <i class="bi bi-box me-1"></i>
                        <span th:text="${order.itemCount} + ' item(s)'">0 items</span>
                    </div>
                </div>

                <!-- Mini tracker -->
                <div class="col-md-5">
                    <!-- Cancelled banner -->
                    <div th:if="${order.status == 'CANCELLED'}" class="text-center">
                        <span class="status-pill st-CANCELLED"><i class="bi bi-x-circle"></i>Order Cancelled</span>
                    </div>
                    <!-- Progress for active orders -->
                    <div th:unless="${order.status == 'CANCELLED'}">
                        <div class="mini-track">
                            <div class="mini-step">
                                <div class="mini-dot done"><i class="bi bi-check"></i></div>
                                <div class="mini-line" th:classappend="${order.status == 'SHIPPED' or order.status == 'DELIVERED'} ? 'done'"></div>
                            </div>
                            <div class="mini-step">
                                <div class="mini-dot" th:classappend="${order.status == 'SHIPPED' or order.status == 'DELIVERED'} ? 'done'"><i class="bi bi-truck"></i></div>
                                <div class="mini-line" th:classappend="${order.status == 'DELIVERED'} ? 'done'"></div>
                            </div>
                            <div class="mini-step" style="flex:0;">
                                <div class="mini-dot" th:classappend="${order.status == 'DELIVERED'} ? 'done'"><i class="bi bi-house-check"></i></div>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="mini-label">Placed</span>
                            <span class="mini-label">Shipped</span>
                            <span class="mini-label">Delivered</span>
                        </div>
                    </div>
                </div>

                <!-- Status + total + action -->
                <div class="col-md-4 text-md-end">
                    <span class="status-pill" th:classappend="'st-' + ${order.status}" th:text="${order.status}">STATUS</span>
                    <div class="order-total mt-2">₹<span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 2, 'POINT')}">0.00</span></div>
                    <a th:href="@{/my-orders/{id}(id=${order.orderId})}" class="btn-track mt-2 d-inline-block">
                        <i class="bi bi-geo-alt me-1"></i>Track Order
                    </a>
                </div>

            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    setTimeout(() => {
        document.querySelectorAll('.alert-float').forEach(a => bootstrap.Alert.getOrCreateInstance(a).close());
    }, 3000);
</script>
</body>
</html>
