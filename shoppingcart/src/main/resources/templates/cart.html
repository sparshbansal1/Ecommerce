<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="page-wrapper">

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1>🛒 ShopEasy</h1>
            <span class="header-subtitle">E-Commerce Platform</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">

        <div class="cart-header">
            <h2>My Shopping Cart</h2>
            <span class="user-badge">User ID: <strong th:text="${userId}"></strong></span>
        </div>

        <!-- Empty Cart Message -->
        <div th:if="${#lists.isEmpty(cartItems)}" class="empty-cart">
            <div class="empty-icon">🛍️</div>
            <p>Your cart is empty.</p>
            <a th:href="@{/cart/add/{userId}(userId=${userId})}" class="btn btn-primary">Add Items</a>
        </div>

        <!-- Cart Items Table -->
        <div th:if="${!#lists.isEmpty(cartItems)}">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Product Name</th>
                        <th>Price (₹)</th>
                        <th>Quantity</th>
                        <th>Subtotal (₹)</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item, stat : ${cartItems}">
                        <td th:text="${stat.count}"></td>
                        <td th:text="${item.productName}"></td>
                        <td th:text="${item.price}"></td>
                        <td>
                            <span class="quantity-badge" th:text="${item.quantity}"></span>
                        </td>
                        <td th:text="${item.subtotal}"></td>
                        <td>
                            <a th:href="@{/cart/remove/{cartId}/{userId}(cartId=${item.cartId}, userId=${userId})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Remove this item?')">
                                Remove
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- Cart Summary -->
            <div class="cart-summary">
                <div class="total-box">
                    <span>Total Amount:</span>
                    <strong class="total-amount">₹ <span th:text="${#numbers.formatDecimal(total, 1, 2)}"></span></strong>
                </div>

                <div class="action-buttons">
                    <a th:href="@{/cart/add/{userId}(userId=${userId})}" class="btn btn-primary">+ Add More</a>
                    <a th:href="@{/cart/clear/{userId}(userId=${userId})}"
                       class="btn btn-warning"
                       onclick="return confirm('Clear entire cart?')">
                        Clear Cart
                    </a>
                    <button class="btn btn-success">Proceed to Checkout</button>
                </div>
            </div>
        </div>

    </main>

    <footer class="footer">
        <p>E-Commerce Platform &copy; 2025 | Module 3.2 - Shopping Cart</p>
    </footer>

</div>

</body>
</html>
